<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpatialScope</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        background: #f4f7f8;
        color: #162126;
        font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        letter-spacing: 0;
      }
      main { display: grid; justify-items: center; gap: 18px; }
      img { width: 92px; height: 92px; object-fit: contain; }
      h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: 0; }
      p { margin: 0; color: #68757a; font-size: 15px; }
      progress { width: 220px; height: 6px; accent-color: #087e8b; }
    </style>
  </head>
  <body>
    <main>
      <img src="assets/SpatialScope.png" alt="SpatialScope" />
      <h1>SpatialScope</h1>
      <progress aria-label="Starting SpatialScope"></progress>
      <p>Starting analysis workspace...</p>
    </main>
  </body>
</html>
