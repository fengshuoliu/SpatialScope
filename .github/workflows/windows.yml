name: Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "windows/**"
      - ".gitignore"
  pull_request:
    paths:
      - ".github/workflows/windows.yml"
      - "windows/**"
      - ".gitignore"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: windows/backend/requirements-native.txt

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Prepare native scientific environment
        shell: pwsh
        run: ./windows/run_native.ps1 setup

      - name: Build, test, and package native Windows release
        shell: pwsh
        run: ./windows/build_native.ps1 -SkipDependencies -FullSmoke

      - name: Upload native Windows portable package
        uses: actions/upload-artifact@v4
        with:
          name: SpatialScope-Windows-x64
          path: |
            windows/native/dist/SpatialScope-Windows-x64-Portable-*.zip
            windows/native/dist/SHA256SUMS-Windows.txt
          if-no-files-found: error
          retention-days: 14
